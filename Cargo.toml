[package]
name = "mediaplayer"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "mediaplayer"
path = "src/main.rs"

[dependencies]
eframe = { version = "0.27", features = ["default"] }
egui = "0.27"
ffmpeg-next = "7.0"
rodio = "0.19"
image = "0.25"
anyhow = "1.0"
crossbeam-channel = "0.5"
parking_lot = "0.12"
once_cell = "1.19"

[build-dependencies]
# Needed for ffmpeg static linking on windows
pkg-config = "0.3"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

[target.'cfg(windows)'.build-dependencies]
winres = "0.1"
