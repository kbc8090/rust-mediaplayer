[package]
name = "mediaplayer"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "mediaplayer"
path = "src/main.rs"

[dependencies]
eframe = { version = "=0.22.0", features = ["default"] }
egui = "=0.22.0"
ffmpeg-next = "=6.0.0"
rodio = "=0.17.0"
anyhow = "1.0"
crossbeam-channel = "0.5"
parking_lot = "0.12"
once_cell = "1.19"
hashbrown = "=0.14.5"
indexmap = "=2.2.6"
# Force old idna/url to avoid ICU deps
idna = "=0.5.0"
url = "=2.4.1"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
